<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Chat — Academia Indrhack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ════════════════════════════════════════════
       NUEVA INTERFAZ DE CHAT - ULTRA PREMIUM
    ════════════════════════════════════════════ */

    .chat-layout {
      display: flex;
      height: calc(100dvh - var(--nav-h) - var(--tabbar-h, 0px));
      overflow: hidden;
      background: linear-gradient(135deg, #0a0a0f 0%, #0f0f18 100%);
    }

    /* ── PANEL DE SALAS (IZQUIERDA) - REDISEÑADO ── */
    .chat-rooms {
      width: 280px;
      flex-shrink: 0;
      background: rgba(15, 15, 25, 0.8);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(204, 34, 0, 0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: inset -1px 0 0 rgba(0, 200, 255, 0.08);
    }

    .chat-rooms__header {
      padding: 1.2rem;
      border-bottom: 2px solid rgba(204, 34, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(204, 34, 0, 0.15) 0%, transparent 100%);
    }

    .chat-rooms__title {
      font-family: var(--font-brand);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--cyan);
      text-transform: uppercase;
      font-weight: 800;
      text-shadow: 0 0 10px rgba(0, 200, 255, 0.4);
    }

    .chat-rooms__list {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem 0;
    }

    .chat-rooms__list::-webkit-scrollbar {
      width: 6px;
    }

    .chat-rooms__list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }

    .chat-rooms__list::-webkit-scrollbar-thumb {
      background: rgba(0, 200, 255, 0.25);
      border-radius: 3px;
    }

    .chat-rooms__list::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 200, 255, 0.4);
    }

    .room-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      cursor: pointer;
      border-left: 4px solid transparent;
      border-radius: 0 8px 8px 0;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-tap-highlight-color: transparent;
      margin: 0.35rem 0.5rem 0.35rem 0;
      position: relative;
    }

    .room-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, rgba(0, 200, 255, 0.05) 0%, transparent 100%);
      border-radius: 0 8px 8px 0;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .room-item:hover {
      background: rgba(0, 200, 255, 0.08);
      border-left-color: rgba(0, 200, 255, 0.4);
      transform: translateX(4px);
    }

    .room-item.active {
      background: linear-gradient(90deg, rgba(204, 34, 0, 0.25) 0%, rgba(204, 34, 0, 0.1) 100%);
      border-left-color: var(--primary);
      box-shadow: 0 0 20px rgba(204, 34, 0, 0.2);
    }

    .room-item.active::before {
      opacity: 1;
    }

    .room-item__icon {
      font-size: 1.3rem;
      flex-shrink: 0;
      filter: drop-shadow(0 0 4px rgba(0, 200, 255, 0.3));
    }

    .room-item.active .room-item__icon {
      filter: drop-shadow(0 0 8px var(--primary));
      animation: pulse-icon 2s infinite;
    }

    @keyframes pulse-icon {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .room-item__info {
      flex: 1;
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .room-item__name {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.2s;
    }

    .room-item:hover .room-item__name {
      color: var(--cyan);
    }

    .room-item.active .room-item__name {
      color: var(--primary);
      font-weight: 800;
      letter-spacing: 0.05em;
    }

    .room-item__sub {
      font-size: 0.7rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 0.15rem;
    }

    .room-item.active .room-item__sub {
      color: rgba(204, 34, 0, 0.7);
    }

    .room-item__badge {
      background: linear-gradient(135deg, var(--primary), #ff4400);
      color: #fff;
      font-size: 0.6rem;
      font-weight: 900;
      padding: 2px 8px;
      border-radius: 12px;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(204, 34, 0, 0.5);
      font-family: var(--font-brand);
      letter-spacing: 0.05em;
    }

    .rooms-section-label {
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cyan);
      padding: 1rem 1.2rem 0.5rem;
      text-shadow: 0 0 8px rgba(0, 200, 255, 0.3);
    }

    /* ── ÁREA DE MENSAJES (DERECHA) ── */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: radial-gradient(circle at 20% 50%, rgba(204, 34, 0, 0.05) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(0, 200, 255, 0.05) 0%, transparent 50%);
    }

    .chat-header {
      padding: 1rem 1.5rem;
      border-bottom: 2px solid rgba(0, 200, 255, 0.15);
      background: linear-gradient(180deg, rgba(10, 10, 15, 0.95) 0%, rgba(10, 10, 15, 0.8) 100%);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
      box-shadow: 0 4px 20px rgba(204, 34, 0, 0.1);
    }

    .chat-header__back {
      display: none;
      background: none;
      border: none;
      color: var(--cyan);
      font-size: 1.4rem;
      cursor: pointer;
      padding: 0.4rem;
    }

    .chat-header__icon {
      font-size: 1.8rem;
      filter: drop-shadow(0 0 8px rgba(0, 200, 255, 0.3));
    }

    .chat-header__info {
      flex: 1;
      min-width: 0;
    }

    .chat-header__name {
      font-family: var(--font-brand);
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: var(--primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 0 10px rgba(204, 34, 0, 0.4);
    }

    .chat-header__sub {
      font-size: 0.75rem;
      color: var(--cyan);
      margin-top: 0.2rem;
      font-weight: 600;
    }

    .chat-header__actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .chat-header-btn {
      background: rgba(0, 200, 255, 0.1);
      border: 1px solid rgba(0, 200, 255, 0.3);
      color: var(--cyan);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.2s;
      display: none;
    }

    .chat-header-btn:hover {
      background: rgba(0, 200, 255, 0.2);
      box-shadow: 0 0 12px rgba(0, 200, 255, 0.3);
    }

    /* ── MENSAJES ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar {
      width: 8px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(0, 200, 255, 0.2);
      border-radius: 4px;
    }

    .chat-messages::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 200, 255, 0.4);
    }

    /* Separador de fecha */
    .msg-date-separator {
      text-align: center;
      margin: 1rem 0;
      font-size: 0.7rem;
      color: var(--text-muted);
      position: relative;
    }

    .msg-date-separator::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(0, 200, 255, 0.2) 50%, transparent 100%);
    }

    .msg-date-separator span {
      background: linear-gradient(135deg, #0a0a0f 0%, #0f0f18 100%);
      padding: 0 1rem;
      position: relative;
    }

    /* MENSAJE */
    .msg {
      display: flex;
      gap: 0.8rem;
      align-items: flex-end;
      animation: msgIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 85%;
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg--own {
      flex-direction: row-reverse;
      align-self: flex-end;
    }

    /* Avatar */
    .msg__avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(0, 200, 255, 0.2), rgba(204, 34, 0, 0.2));
      border: 2px solid var(--cyan);
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 800;
      color: var(--cyan);
      font-family: var(--font-brand);
      box-shadow: 0 0 12px rgba(0, 200, 255, 0.3);
      position: relative;
    }

    .msg--own .msg__avatar {
      border-color: var(--primary);
      background: linear-gradient(135deg, rgba(204, 34, 0, 0.3), rgba(0, 200, 255, 0.1));
      box-shadow: 0 0 12px rgba(204, 34, 0, 0.4);
    }

    .msg__avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Body del mensaje */
    .msg__body {
      max-width: calc(100% - 50px);
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    /* Meta (usuario + hora) */
    .msg__meta {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.15rem;
    }

    .msg--own .msg__meta {
      flex-direction: row-reverse;
    }

    .msg__username {
      font-size: 0.75rem;
      font-weight: 800;
      color: var(--cyan);
      font-family: var(--font-brand);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .msg--own .msg__username {
      color: var(--primary);
    }

    .msg__rango {
      font-size: 0.65rem;
      color: var(--gold);
      font-weight: 700;
      font-family: var(--font-brand);
      letter-spacing: 0.04em;
      margin-left: 0.4rem;
    }

    .msg__time {
      font-size: 0.65rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Burbuja de mensaje */
    .msg__bubble {
      background: linear-gradient(135deg, rgba(0, 200, 255, 0.08), rgba(0, 200, 255, 0.04));
      border: 1px solid rgba(0, 200, 255, 0.25);
      border-radius: 4px 16px 16px 4px;
      padding: 0.8rem 1rem;
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
      position: relative;
      box-shadow: 0 4px 16px rgba(0, 200, 255, 0.08);
      transition: all 0.2s;
    }

    .msg__bubble:hover {
      border-color: rgba(0, 200, 255, 0.4);
      box-shadow: 0 6px 24px rgba(0, 200, 255, 0.12);
    }

    .msg--own .msg__bubble {
      background: linear-gradient(135deg, rgba(204, 34, 0, 0.15), rgba(204, 34, 0, 0.08));
      border-color: rgba(204, 34, 0, 0.3);
      border-radius: 16px 4px 16px 16px;
      box-shadow: 0 4px 16px rgba(204, 34, 0, 0.1);
    }

    .msg--own .msg__bubble:hover {
      border-color: rgba(204, 34, 0, 0.5);
      box-shadow: 0 6px 24px rgba(204, 34, 0, 0.15);
    }

    /* Reply quote dentro de burbuja */
    .msg__reply-quote {
      background: rgba(0, 200, 255, 0.08);
      border-left: 3px solid var(--cyan);
      border-radius: 4px;
      padding: 0.4rem 0.6rem;
      margin-bottom: 0.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-style: italic;
    }

    .msg__reply-quote strong {
      color: var(--cyan);
      font-style: normal;
    }

    /* Archivos/Certificados */
    .msg__file {
      background: rgba(212, 160, 23, 0.1);
      border: 1px solid rgba(212, 160, 23, 0.3);
      border-radius: 8px;
      padding: 0.6rem;
      margin-top: 0.5rem;
      display: flex;
      gap: 0.6rem;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .msg__file:hover {
      background: rgba(212, 160, 23, 0.15);
      border-color: rgba(212, 160, 23, 0.5);
    }

    .msg__file-icon {
      font-size: 1.2rem;
    }

    .msg__file-info {
      flex: 1;
      min-width: 0;
    }

    .msg__file-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gold);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .msg__file-size {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    /* Acciones del mensaje */
    .msg__actions {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.5rem;
      opacity: 0;
      transition: opacity 0.2s;
      flex-wrap: wrap;
    }

    .msg:hover .msg__actions,
    .msg:focus-within .msg__actions {
      opacity: 1;
    }

    .msg__action-btn {
      background: rgba(0, 200, 255, 0.12);
      border: 1px solid rgba(0, 200, 255, 0.3);
      border-radius: 6px;
      color: var(--cyan);
      font-size: 0.7rem;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
    }

    .msg__action-btn:hover {
      background: rgba(0, 200, 255, 0.25);
      border-color: var(--cyan);
      box-shadow: 0 0 12px rgba(0, 200, 255, 0.3);
    }

    /* HILO (replies anidadas) */
    .thread-replies {
      margin-left: 48px;
      padding: 0.8rem 0 0;
      border-left: 2px solid rgba(0, 200, 255, 0.2);
      padding-left: 1rem;
      display: none;
    }

    .thread-replies.show {
      display: block;
      animation: threadSlideIn 0.3s ease;
    }

    @keyframes threadSlideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* INPUT AREA - REDISEÑADO */
    .chat-input-area {
      padding: 1.2rem 1.5rem;
      border-top: 2px solid rgba(0, 200, 255, 0.15);
      background: linear-gradient(180deg, rgba(10, 10, 15, 0.8) 0%, rgba(15, 15, 25, 0.95) 100%);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
      box-shadow: inset 0 2px 20px rgba(0, 0, 0, 0.3);
    }

    .reply-preview {
      background: rgba(0, 200, 255, 0.08);
      border: 1px solid rgba(0, 200, 255, 0.2);
      border-radius: 8px;
      padding: 0.8rem;
      margin-bottom: 1rem;
      display: none;
      gap: 0.8rem;
      align-items: center;
    }

    .reply-preview.show {
      display: flex;
    }

    .reply-preview__icon {
      color: var(--cyan);
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .reply-preview__content {
      flex: 1;
      min-width: 0;
    }

    .reply-preview__user {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--cyan);
    }

    .reply-preview__text {
      font-size: 0.8rem;
      color: var(--text-soft);
      margin-top: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .reply-preview__close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 0;
      flex-shrink: 0;
    }

    /* Input box */
    .input-row {
      display: flex;
      gap: 0.8rem;
      align-items: flex-end;
    }

    .input-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .input-action-btn {
      background: rgba(0, 200, 255, 0.1);
      border: 1px solid rgba(0, 200, 255, 0.3);
      color: var(--cyan);
      border-radius: 8px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.2s;
    }

    .input-action-btn:hover {
      background: rgba(0, 200, 255, 0.25);
      box-shadow: 0 0 16px rgba(0, 200, 255, 0.3);
    }

    .input-action-btn.badge::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 50%;
      top: 0;
      right: 0;
      box-shadow: 0 0 8px var(--gold);
    }

    #chat-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(0, 200, 255, 0.2);
      border-radius: 12px;
      color: var(--text);
      padding: 0.8rem 1rem;
      font-family: var(--font-body);
      font-size: 0.9rem;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      outline: none;
      transition: all 0.2s;
    }

    #chat-input:focus {
      border-color: rgba(0, 200, 255, 0.5);
      background: rgba(0, 200, 255, 0.05);
      box-shadow: 0 0 20px rgba(0, 200, 255, 0.15);
    }

    #chat-input::placeholder {
      color: var(--text-muted);
    }

    /* Botón enviar */
    #btn-send {
      background: linear-gradient(135deg, var(--primary), #ff4400);
      border: none;
      color: #fff;
      border-radius: 10px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: bold;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 16px rgba(204, 34, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    #btn-send::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3), transparent 80%);
      opacity: 0;
    }

    #btn-send:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(204, 34, 0, 0.5);
    }

    #btn-send:active {
      transform: translateY(0);
    }

    #btn-send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* MODAL SELECTOR DE CLASE */
    .class-picker-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s;
    }

    .class-picker-overlay.show {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .class-picker {
      background: linear-gradient(135deg, #16161f 0%, #0f0f18 100%);
      border: 2px solid rgba(0, 200, 255, 0.3);
      border-radius: 16px;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 40px rgba(0, 200, 255, 0.2), inset 0 0 40px rgba(204, 34, 0, 0.05);
      animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .class-picker__header {
      padding: 1.5rem;
      border-bottom: 2px solid rgba(0, 200, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(0, 200, 255, 0.1) 0%, transparent 100%);
    }

    .class-picker__title {
      font-family: var(--font-brand);
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--cyan);
      letter-spacing: 0.08em;
    }

    .class-picker__close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .class-picker__search {
      padding: 1rem;
      border-bottom: 1px solid rgba(0, 200, 255, 0.1);
    }

    .class-picker__search input {
      width: 100%;
      background: rgba(0, 200, 255, 0.05);
      border: 1px solid rgba(0, 200, 255, 0.2);
      border-radius: 8px;
      color: var(--text);
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s;

  <!-- Firebase + Chat Logic -->
  <script type="module">
    import { auth, db } from './js/firebase-config.js';
    import { 
      onAuthStateChanged,
      signOut 
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import {
      collection,
      query,
      where,
      onSnapshot,
      addDoc,
      updateDoc,
      doc,
      getDocs,
      serverTimestamp,
      increment
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    /* ESTADO GLOBAL */
    let ME = null;
    let ROOM = null;
    let REPLY_TO = null;
    let ALL_COURSES = [];
    let UNSUBSCRIBE_MESSAGES = null;
    let UNSUBSCRIBE_REPLIES = null;

    /* INICIALIZAR */
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.replace('login.html');
        return;
      }

      try {
        const snap = await getDocs(query(collection(db, 'users'), where('uid', '==', user.uid)));
        if (snap.empty) {
          alert('Perfil no encontrado');
          signOut(auth);
          return;
        }
        ME = { uid: user.uid, ...snap.docs[0].data() };
        console.log('Usuario cargado:', ME);
      } catch (e) {
        alert('Error: ' + e.message);
        signOut(auth);
      }
    });

    /* ════════════════════════════════════════════
       CARGAR Y RENDERIZAR SALAS
    ════════════════════════════════════════════ */
    async function loadRooms() {
      if (!ME) return;

      try {
        const snap = await getDocs(collection(db, 'chat_rooms'));
        const rooms = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        const generalRooms = rooms.filter(r => r.type === 'general');
        const classRooms = rooms.filter(r => r.type === 'class');
        const privateRooms = rooms.filter(r => r.type === 'private');

        renderRooms('GENERAL', generalRooms);
        renderRooms('CURSOS', classRooms);
        renderRooms('PRIVADAS', privateRooms);
      } catch (e) {
        console.error('Error al cargar salas:', e);
      }
    }

    function renderRooms(section, rooms) {
      const list = document.querySelector('.chat-rooms__list');
      const label = Array.from(list.querySelectorAll('.rooms-section-label')).find(el =>
        el.textContent.includes(section.toUpperCase())
      );

      if (!label) return;

      let container = label.nextElementSibling;
      while (container && container.classList.contains('room-item')) {
        container.remove();
        container = label.nextElementSibling;
      }

      rooms.forEach(room => {
        const el = document.createElement('div');
        el.className = 'room-item' + (ROOM?.id === room.id ? ' active' : '');
        el.innerHTML = `
          <div class="room-item__icon">${room.icon || '💬'}</div>
          <div class="room-item__info">
            <div class="room-item__name">${room.name}</div>
            <div class="room-item__sub">${room.msgCount || 0} mensajes</div>
          </div>
          ${room.msgCount > 0 && ROOM?.id !== room.id ? `<div class="room-item__badge">${room.msgCount}</div>` : ''}
        `;
        el.addEventListener('click', () => openRoom(room));
        label.parentElement.insertBefore(el, label.nextElementSibling);
      });
    }

    /* ════════════════════════════════════════════
       ABRIR SALA Y CARGAR MENSAJES
    ════════════════════════════════════════════ */
    function openRoom(room) {
      ROOM = room;
      REPLY_TO = null;

      // Actualizar header
      document.getElementById('room-icon').textContent = room.icon || '💬';
      document.getElementById('room-name').textContent = room.name;
      document.getElementById('room-subtitle').textContent =
        room.type === 'class' ? '📚 Canal de clase' :
        room.type === 'private' ? '🔒 Privado' : '🌍 Comunidad';

      // Mostrar botones según tipo
      document.getElementById('btn-nuevo-hilo').style.display = room.type === 'class' ? 'block' : 'none';
      document.getElementById('btn-share-rank').style.display = 'block';
      document.getElementById('btn-share-cert').style.display = 'block';

      // Cargar mensajes
      loadMessages();
      loadRooms(); // Actualizar lista
      closeMobileRooms();
    }

    function loadMessages() {
      if (!ROOM) return;

      if (UNSUBSCRIBE_MESSAGES) UNSUBSCRIBE_MESSAGES();

      const messagesDiv = document.getElementById('chat-messages');
      messagesDiv.innerHTML = '';

      const q = query(
        collection(db, 'chat_messages'),
        where('roomId', '==', ROOM.id)
      );

      UNSUBSCRIBE_MESSAGES = onSnapshot(q, (snap) => {
        const messages = snap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .sort((a, b) => (a.createdAt?.toMillis?.() || 0) - (b.createdAt?.toMillis?.() || 0));

        messagesDiv.innerHTML = '';

        messages.forEach((msg, idx) => {
          // Separador de fecha
          const msgDate = msg.createdAt?.toDate?.();
          const prevDate = messages[idx - 1]?.createdAt?.toDate?.();
          if (!prevDate || msgDate.toDateString() !== prevDate.toDateString()) {
            const sep = document.createElement('div');
            sep.className = 'msg-date-separator';
            sep.innerHTML = `<span>${fmtDate(msgDate)}</span>`;
            messagesDiv.appendChild(sep);
          }

          const el = renderMessage(msg);
          messagesDiv.appendChild(el);
        });

        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      });
    }

    function renderMessage(msg) {
      const isOwn = msg.uid === ME.uid;
      const el = document.createElement('div');
      el.className = 'msg' + (isOwn ? ' msg--own' : '');

      let replyHtml = '';
      if (msg.replyTo) {
        replyHtml = `
          <div class="msg__reply-quote">
            <strong>↪️ ${escapeHtml(msg.replyTo.username)}</strong><br>
            ${escapeHtml(truncate(msg.replyTo.text, 60))}
          </div>
        `;
      }

      el.innerHTML = `
        <div class="msg__avatar" title="${msg.username}">
          ${msg.photoURL ? `<img src="${msg.photoURL}" alt="${msg.username}">` : msg.username.charAt(0).toUpperCase()}
        </div>
        <div class="msg__body">
          <div class="msg__meta">
            <span class="msg__username">${escapeHtml(msg.username)}</span>
            ${msg.rango ? `<span class="msg__rango">${msg.rango}</span>` : ''}
            <span class="msg__time">${fmtTime(msg.createdAt?.toDate?.())}</span>
          </div>
          <div class="msg__bubble">
            ${replyHtml}
            ${escapeHtml(msg.text)}
            ${msg.fileUrl ? `<div class="msg__file"><div class="msg__file-icon">📄</div><div class="msg__file-info"><div class="msg__file-name">${escapeHtml(msg.fileName)}</div><div class="msg__file-size">${msg.fileSize}</div></div></div>` : ''}
          </div>
          <div class="msg__actions">
            <button class="msg__action-btn" onclick="replyTo('${msg.id}', '${escapeAttr(msg.username)}', '${escapeAttr(msg.text)}')">↪️ Responder</button>
            <button class="msg__action-btn" onclick="expandThread('${msg.id}')">🧵 ${msg.threadCount || 0}</button>
          </div>
        </div>
        <div id="thread-${msg.id}" class="thread-replies"></div>
      `;

      el.addEventListener('mouseenter', () => {
        el.querySelector('.msg__actions').style.opacity = '1';
      });

      el.addEventListener('mouseleave', () => {
        el.querySelector('.msg__actions').style.opacity = '0';
      });

      return el;
    }

    /* ════════════════════════════════════════════
       FUNCIONES DE REPLY Y THREAD
    ════════════════════════════════════════════ */
    window.replyTo = function(msgId, username, text) {
      REPLY_TO = {
        id: msgId,
        username: username,
        text: text
      };
      document.getElementById('reply-preview').classList.add('show');
      document.getElementById('reply-user').textContent = username;
      document.getElementById('reply-text').textContent = text;
      document.getElementById('chat-input').focus();
    };

    window.expandThread = async function(parentId) {
      const threadDiv = document.getElementById(`thread-${parentId}`);
      threadDiv.classList.toggle('show');

      if (!threadDiv.classList.contains('show')) return;

      try {
        const snap = await getDocs(query(
          collection(db, 'chat_replies'),
          where('parentId', '==', parentId)
        ));

        threadDiv.innerHTML = '';
        snap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .sort((a, b) => (a.createdAt?.toMillis?.() || 0) - (b.createdAt?.toMillis?.() || 0))
          .forEach(reply => {
            const replyEl = document.createElement('div');
            replyEl.style.marginBottom = '0.6rem';
            replyEl.innerHTML = `
              <div style="display:flex;gap:0.5rem;align-items:flex-start">
                <div class="msg__avatar" style="width:28px;height:28px;font-size:0.65rem">${reply.username.charAt(0).toUpperCase()}</div>
                <div style="flex:1;min-width:0">
                  <div class="msg__meta" style="margin-bottom:0.1rem">
                    <span class="msg__username">${escapeHtml(reply.username)}</span>
                    <span class="msg__time">${fmtTime(reply.createdAt?.toDate?.())}</span>
                  </div>
                  <div class="msg__bubble" style="max-width:300px">${escapeHtml(reply.text)}</div>
                </div>
              </div>
            `;
            threadDiv.appendChild(replyEl);
          });
      } catch (e) {
        console.error('Error al cargar replies:', e);
      }
    };

    /* ════════════════════════════════════════════
       ENVIAR MENSAJE
    ════════════════════════════════════════════ */
    document.getElementById('btn-send').addEventListener('click', sendMessage);
    document.getElementById('chat-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || !ROOM || !ME) return;

      const btn = document.getElementById('btn-send');
      btn.disabled = true;

      try {
        const payload = {
          roomId: ROOM.id,
          uid: ME.uid,
          username: ME.username,
          photoURL: ME.photoURL || '',
          text,
          createdAt: serverTimestamp(),
          threadCount: 0,
        };

        if (REPLY_TO) {
          payload.replyTo = {
            id: REPLY_TO.id,
            username: REPLY_TO.username,
            text: REPLY_TO.text,
          };
        }

        await addDoc(collection(db, 'chat_messages'), payload);
        await updateDoc(doc(db, 'chat_rooms', ROOM.id), {
          lastMsg: text,
          lastAt: serverTimestamp(),
          msgCount: increment(1),
        });

        input.value = '';
        input.style.height = '';
        REPLY_TO = null;
        document.getElementById('reply-preview').classList.remove('show');

        setTimeout(() => {
          document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
        }, 50);
      } catch (e) {
        alert('Error: ' + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    /* ════════════════════════════════════════════
       COMPARTIR RANGO Y CERTIFICADO
    ════════════════════════════════════════════ */
    document.querySelectorAll('.share-modal__tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.share-modal__tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.share-modal__tab-content').forEach(c => c.style.display = 'none');
        tab.classList.add('active');
        document.getElementById(`tab-${tab.dataset.tab}`).style.display = 'block';
      });
    });

    document.getElementById('btn-share-rank').addEventListener('click', () => {
      document.getElementById('share-modal').classList.add('show');
    });

    document.getElementById('btn-share-cert').addEventListener('click', () => {
      document.getElementById('share-modal').classList.add('show');
      document.querySelectorAll('.share-modal__tab')[1].click();
    });

    window.shareRank = async function() {
      const select = document.getElementById('rank-select');
      const message = document.getElementById('rank-message');
      const rango = select.value;
      const texto = message.value.trim() || '¡Acabo de ascender! 🎉';

      if (!ROOM) {
        alert('Selecciona una sala primero');
        return;
      }

      try {
        await addDoc(collection(db, 'chat_messages'), {
          roomId: ROOM.id,
          uid: ME.uid,
          username: ME.username,
          photoURL: ME.photoURL || '',
          text: texto,
          rango: `⭐ ${rango.toUpperCase()}`,
          createdAt: serverTimestamp(),
          threadCount: 0,
        });

        await updateDoc(doc(db, 'chat_rooms', ROOM.id), {
          lastMsg: texto,
          lastAt: serverTimestamp(),
          msgCount: increment(1),
        });

        document.getElementById('share-modal').classList.remove('show');
        message.value = '';
      } catch (e) {
        alert('Error: ' + e.message);
      }
    };

    window.shareCertificate = async function() {
      const course = document.getElementById('cert-course').value.trim();
      const message = document.getElementById('cert-message').value.trim() || `¡Completé el curso: ${course}! 🎓`;

      if (!course) {
        alert('Ingresa el nombre del curso');
        return;
      }

      if (!ROOM) {
        alert('Selecciona una sala primero');
        return;
      }

      try {
        await addDoc(collection(db, 'chat_messages'), {
          roomId: ROOM.id,
          uid: ME.uid,
          username: ME.username,
          photoURL: ME.photoURL || '',
          text: `📜 **CERTIFICADO COMPARTIDO**\n${message}\n📚 Curso: ${course}`,
          createdAt: serverTimestamp(),
          threadCount: 0,
        });

        await updateDoc(doc(db, 'chat_rooms', ROOM.id), {
          lastMsg: message,
          lastAt: serverTimestamp(),
          msgCount: increment(1),
        });

        document.getElementById('share-modal').classList.remove('show');
        document.getElementById('cert-course').value = '';
        document.getElementById('cert-message').value = '';
      } catch (e) {
        alert('Error: ' + e.message);
      }
    };

    /* ════════════════════════════════════════════
       CREAR HILO EN CURSO (CLASE)
    ════════════════════════════════════════════ */
    document.getElementById('btn-nuevo-hilo').addEventListener('click', async () => {
      const overlay = document.getElementById('class-picker-overlay');
      overlay.classList.add('show');

      if (ALL_COURSES.length === 0) {
        const list = document.getElementById('picker-list');
        list.innerHTML = '<p style="padding:1rem;color:var(--text-muted);">Cargando cursos...</p>';

        try {
          const snap = await getDocs(query(collection(db, 'courses'), where('publicado', '==', true)));
          ALL_COURSES = snap.docs.map(d => ({ id: d.id, ...d.data() }))
            .sort((a, b) => (a.orden || 0) - (b.orden || 0));

          renderPicker('');
        } catch (e) {
          list.innerHTML = '<p style="padding:1rem;color:#ff6b6b;">Error al cargar cursos</p>';
        }
      }
    });

    function renderPicker(term) {
      const t = term.toLowerCase();
      const filtered = t ? ALL_COURSES.filter(c =>
        (c.titulo || '').toLowerCase().includes(t) ||
        (c.categoria || '').toLowerCase().includes(t)
      ) : ALL_COURSES;

      const list = document.getElementById('picker-list');
      if (filtered.length === 0) {
        list.innerHTML = '<p style="padding:1rem;color:var(--text-muted);">No hay resultados</p>';
        return;
      }

      list.innerHTML = filtered.map(c => `
        <div class="class-picker__item" data-course-id="${c.id}">
          <div class="class-picker__item-title">${c.titulo}</div>
          <div class="class-picker__item-cat">📁 ${c.categoria || 'General'} · ${c.nivel || 'Básico'}</div>
        </div>
      `).join('');

      list.querySelectorAll('.class-picker__item').forEach(el => {
        el.addEventListener('click', async () => {
          const courseId = el.dataset.courseId;
          document.getElementById('class-picker-overlay').classList.remove('show');

          try {
            const snap = await getDocs(query(collection(db, 'chat_rooms'), where('courseId', '==', courseId)));
            let room;

            if (!snap.empty) {
              room = { id: snap.docs[0].id, ...snap.docs[0].data() };
            } else {
              const course = ALL_COURSES.find(c => c.id === courseId);
              const ref = await addDoc(collection(db, 'chat_rooms'), {
                type: 'class',
                courseId,
                name: course.titulo,
                categoria: course.categoria,
                icon: '📚',
                lastMsg: '',
                lastAt: serverTimestamp(),
                msgCount: 0,
              });
              room = { id: ref.id, type: 'class', courseId, name: course.titulo, icon: '📚' };
            }

            openRoom(room);
          } catch (e) {
            alert('Error: ' + e.message);
          }
        });
      });
    }

    document.getElementById('picker-search').addEventListener('input', (e) => {
      renderPicker(e.target.value);
    });

    document.getElementById('btn-close-picker').addEventListener('click', () => {
      document.getElementById('class-picker-overlay').classList.remove('show');
    });

    /* ════════════════════════════════════════════
       MOBILE
    ════════════════════════════════════════════ */
    function closeMobileRooms() {
      document.getElementById('chat-rooms-panel').classList.remove('mobile-open');
    }

    /* ════════════════════════════════════════════
       UTILIDADES
    ════════════════════════════════════════════ */
    function truncate(str, n) {
      return str && str.length > n ? str.substring(0, n) + '…' : str || '';
    }

    function escapeHtml(str) {
      return (str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escapeAttr(str) {
      return (str || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function fmtTime(date) {
      return date ? date.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' }) : '—';
    }

    function fmtDate(date) {
      if (!date) return '—';
      const today = new Date();
      const d = new Date(date);
      if (d.toDateString() === today.toDateString()) return 'Hoy';
      const yesterday = new Date(today);
      yesterday.setDate(today.getDate() - 1);
      if (d.toDateString() === yesterday.toDateString()) return 'Ayer';
      return d.toLocaleDateString('es-MX', { weekday: 'short', day: 'numeric', month: 'short' });
    }

    // Cargar salas al iniciar
    setTimeout(() => {
      loadRooms();
    }, 1000);
  </script>
</body>
</html>
