<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursos — Academia Indrhack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <header class="navbar">
    <a href="index.html" class="navbar__brand">
      <span class="mark">⚘</span> ACADEMIA INDRHACK
    </a>
    <nav class="navbar__links">
      <a href="index.html">Inicio</a>
      <a href="cursos.html" class="active">Cursos</a>
      <a href="redes.html">Redes</a>
      <a href="configuracion.html">Configuración</a>
      <div class="navbar__session" data-session-slot></div>
    </nav>
    <button class="navbar__toggle" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
  </header>

  <main>
    <div class="container section">
      <h1 class="section-title">Nuestros <span class="accent">cursos</span></h1>
      <p class="section-subtitle">Rutas de aprendizaje en informática, ciberseguridad, hacking ético y privacidad digital.</p>

      <div class="card-grid" data-courses-grid>
        <p class="section-subtitle">Cargando cursos…</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    ACADEMIA INDRHACK — Formación en Informática, Ciberseguridad y Hacking Ético
  </footer>

  <script src="js/particles.js"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module">
    import { db } from './js/firebase-config.js';
    import { collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { onSessionChange, ESTADOS } from './js/auth.js';

    const grid = document.querySelector('[data-courses-grid]');
    let isApproved = false;
    let courses = [];

    onSessionChange((profile) => {
      isApproved = !!profile && profile.estado === ESTADOS.APROBADO;
      render();
    });

    async function loadCourses() {
      const snap = await getDocs(collection(db, 'courses'));
      courses = snap.docs
        .map((d) => ({ id: d.id, ...d.data() }))
        .filter((c) => c.publicado);
      render();
    }

    function render() {
      if (courses.length === 0) {
        grid.innerHTML = '<p class="section-subtitle">Aún no hay cursos publicados. Vuelve pronto.</p>';
        return;
      }

      grid.innerHTML = courses.map((c) => `
        <div class="card">
          ${c.imagen ? `<img src="${c.imagen}" alt="${c.titulo}" style="border-radius:8px;margin-bottom:1rem;aspect-ratio:16/9;object-fit:cover">` : ''}
          <span class="badge badge--aprobado">${c.nivel || 'General'}</span>
          <h3 class="mt-lg">${c.titulo || 'Sin título'}</h3>
          <p class="section-subtitle">${c.descripcion || ''}</p>
          ${c.material ? `<p class="section-subtitle"><strong>Material:</strong> ${c.material}</p>` : ''}
          ${isApproved
            ? `<a class="btn btn--primary btn--small" href="${c.descarga || '#'}" target="_blank" rel="noopener">Descargar</a>`
            : `<a class="btn btn--outline btn--small" href="login.html">Inicia sesión para acceder</a>`
          }
        </div>
      `).join('');
    }

    loadCourses();
  </script>
</body>
</html>
