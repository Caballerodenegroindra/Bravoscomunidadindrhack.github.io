<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1117" />
  <title>Cursos — Academia Indrhack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .curso-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .curso-card:hover { border-color: var(--color-accent-emphasis); box-shadow: 0 0 12px var(--color-accent-emphasis)33; }
    .curso-card.expanded { border-color: var(--color-accent-fg); }
    .curso-descripcion {
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      color: #aaa;
      font-size: 0.9rem;
      margin: 0.5rem 0;
      white-space: pre-wrap;
    }
    .curso-descripcion.full {
      display: block;
      -webkit-line-clamp: unset;
    }
    .categoria-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 2rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--color-accent-emphasis)44;
    }
    .categoria-icon { font-size: 1.4rem; }
    .nivel-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .nivel-basico { background: var(--color-accent-fg)22; color: var(--color-accent-fg); border: 1px solid var(--color-accent-fg); }
    .nivel-intermedio { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b; }
    .nivel-avanzado { background: var(--color-accent-emphasis)22; color: var(--color-accent-emphasis); border: 1px solid var(--color-accent-emphasis); }
    .expand-hint { color: #555; font-size: 0.75rem; margin-top: 0.25rem; }
    .curso-actions { display: flex; gap: 0.75rem; margin-top: 1rem; flex-wrap: wrap; }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>
  <header class="navbar">
    <a href="index.html" class="navbar__brand"><img src="assets/img/logo-indrhack.png" alt="Academia Indrhack" style="height:36px;width:36px;object-fit:contain;border-radius:50%"> ACADEMIA INDRHACK</a>
    <nav class="navbar__links">
      <a href="index.html">Inicio</a>
      <a href="cursos.html">Cursos</a>
      <a href="noticias.html">Noticias</a>
      <a href="redes.html">Redes</a>
      <div class="navbar__session" data-session-slot></div>
    </nav>
    <button class="navbar__toggle" aria-label="Abrir menú"><span></span><span></span><span></span></button>
  </header>

  <nav class="tabbar" aria-label="Navegación principal">
    <div class="tabbar__inner">
      <a href="index.html" class="tabbar__item"><span class="tabbar__icon"><svg viewBox="0 0 24 24"><polyline points="4 17 4 10 12 3 20 10 20 17"/><rect x="9" y="17" width="6" height="7"/></svg></span>Inicio</a>
      <a href="cursos.html" class="tabbar__item active"><span class="tabbar__icon"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span>Cursos</a>
      <a href="noticias.html" class="tabbar__item"><span class="tabbar__icon"><svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></span>Noticias</a>
      <a href="redes.html" class="tabbar__item"><span class="tabbar__icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="20" r="1"/><path d="M5.5 15.5A8.38 8.38 0 0112 13a8.38 8.38 0 016.5 2.5"/><path d="M2 11a12.93 12.93 0 0110-4 12.93 12.93 0 0110 4"/></svg></span>Redes</a>
      <a href="configuracion.html" class="tabbar__item"><span class="tabbar__icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span>Config</a>
    </div>
  </nav>

  <main>
    <div class="container section">
      <h1 class="section-title">Nuestros <span class="accent">Cursos</span></h1>
      <p class="section-subtitle">Rutas de aprendizaje en informática, ciberseguridad, hacking ético y privacidad digital.</p>

      <!-- Filtro por categoría -->
      <div id="filtros" style="display:flex;gap:0.5rem;flex-wrap:wrap;margin:1.5rem 0"></div>

      <div id="cursos-container">
        <p class="section-subtitle">Cargando cursos...</p>
      </div>
    </div>
  </main>

  <!-- Modal detalle curso -->
  <div id="curso-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:999;align-items:flex-start;justify-content:center;overflow-y:auto;padding:2rem 1rem">
    <div class="card" style="width:100%;max-width:600px;margin:auto;position:relative">
      <button id="curso-modal-close" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:#aaa;cursor:pointer;font-size:1.5rem">✕</button>
      <div id="curso-modal-content"></div>
    </div>
  </div>

  <footer class="footer">ACADEMIA INDRHACK — Formación en Informática, Ciberseguridad y Hacking Ético</footer>

  <script src="js/particles.js"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module">
    import { db } from './js/firebase-config.js';
    import { collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const container = document.getElementById('cursos-container');
    const filtrosEl = document.getElementById('filtros');
    const modal = document.getElementById('curso-modal');
    const modalContent = document.getElementById('curso-modal-content');
    document.getElementById('curso-modal-close').onclick = () => modal.style.display = 'none';

    const nivelClass = { 'Básico': 'nivel-basico', 'Intermedio': 'nivel-intermedio', 'Avanzado': 'nivel-avanzado' };

    let allCursos = [];
    let categorias = [];
    let filtroActivo = 'todos';

    // Verificar sesión del usuario
    import { auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (snap.exists()) window._currentUser = { uid: user.uid, ...snap.data() };
      }
    });

    async function cargarCursos() {
      try {
        const snap = await getDocs(collection(db, 'courses'));

        if (snap.empty) {
          container.innerHTML = '<p class="section-subtitle">No hay cursos publicados aún.</p>';
          return;
        }

        allCursos = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(c => c.publicado !== false);

        if (allCursos.length === 0) {
          container.innerHTML = '<p class="section-subtitle">No hay cursos publicados aún.</p>';
          return;
        }

        categorias = [...new Set(allCursos.map(c => c.categoria || 'General'))];

        filtrosEl.innerHTML = '<button class="btn btn--small btn--primary" data-filtro="todos">Todos</button>' +
          categorias.map(cat => '<button class="btn btn--small btn--outline" data-filtro="' + cat + '">' + cat + '</button>').join('');

        filtrosEl.querySelectorAll('[data-filtro]').forEach(btn => {
          btn.addEventListener('click', () => {
            filtroActivo = btn.dataset.filtro;
            filtrosEl.querySelectorAll('[data-filtro]').forEach(b => b.className = 'btn btn--small btn--outline');
            btn.className = 'btn btn--small btn--primary';
            renderCursos();
          });
        });

        renderCursos();
      } catch(e) {
        container.innerHTML = '<p class="section-subtitle">❌ Error: ' + e.message + '</p>';
      }
    }

    cargarCursos();

    function renderCursos() {
      const lista = filtroActivo === 'todos'
        ? allCursos
        : allCursos.filter(c => (c.categoria || 'General') === filtroActivo);

      if (lista.length === 0) {
        container.innerHTML = '<p class="section-subtitle">No hay cursos en esta categoría.</p>';
        return;
      }

      // Agrupar por categoría
      const grupos = {};
      lista.forEach(c => {
        const cat = c.categoria || 'General';
        if (!grupos[cat]) grupos[cat] = [];
        grupos[cat].push(c);
      });

      container.innerHTML = Object.entries(grupos).map(([cat, cursos]) => `
        <div class="categoria-header">
          <span class="categoria-icon">📁</span>
          <h2 style="margin:0;font-size:1.1rem;color:#fff">${cat}</h2>
          <span style="color:#888;font-size:0.82rem">${cursos.length} clase${cursos.length !== 1 ? 's' : ''}</span>
        </div>
        ${cursos.map(c => `
          <div class="curso-card" data-id="${c.id}">
            <span class="nivel-badge ${nivelClass[c.nivel] || 'nivel-basico'}">${c.nivel || 'Básico'}</span>
            <h3 style="margin:0.25rem 0;font-size:1rem">${c.titulo}</h3>
            <p class="curso-descripcion">${c.descripcion || ''}</p>
            <p class="expand-hint">Toca para ver más →</p>
          </div>
        `).join('')}
      `).join('');

      container.querySelectorAll('.curso-card').forEach(card => {
        card.addEventListener('click', () => {
          const curso = allCursos.find(c => c.id === card.dataset.id);
          abrirModal(curso);
        });
      });
    }

    function abrirModal(c) {
      const user = window._currentUser || null;
      const logueado = user && user.estado === 'aprobado';

      const puntosMap = { 'Básico': 100, 'Intermedio': 200, 'Avanzado': 400 };
      const puntos = puntosMap[c.nivel] || 100;

      const descargaBtn = c.descarga && logueado
        ? `<a href="${c.descarga}" target="_blank" download class="btn btn--primary">⬇ Descargar material</a>`
        : c.descarga
          ? `<div style="background:var(--color-accent-emphasis)22;border:1px solid var(--color-accent-emphasis);border-radius:8px;padding:0.75rem;margin-top:0.5rem;color:#ff6b6b;font-size:0.85rem">🔒 Debes <a href="login.html" style="color:var(--color-accent-fg)">iniciar sesión</a> para descargar este material.</div>`
          : '';

      const verClaseBtn = logueado
        ? `<a href="clase.html?id=${c.id}" class="btn btn--primary" style="width:100%;justify-content:center;text-align:center">📖 Ver clase y rendir quiz</a>`
        : `<a href="login.html" class="btn btn--outline" style="width:100%;justify-content:center;text-align:center">🔒 Iniciar sesión para acceder</a>`;

      const enlaceBtn = c.enlace && logueado
        ? `<a href="${c.enlace}" target="_blank" class="btn btn--outline">🔗 Recurso externo</a>`
        : '';

      modalContent.innerHTML = `
        <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.75rem">
          <span class="nivel-badge ${nivelClass[c.nivel] || 'nivel-basico'}">${c.nivel || 'Básico'}</span>
          <span style="background:#ffcc0022;border:1px solid #ffcc00;color:#ffcc00;padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:700">⭐ ${puntos} puntos</span>
        </div>
        <h2 style="margin:0 0 0.75rem;padding-right:2rem">${c.titulo}</h2>
        <p style="color:#aaa;white-space:pre-wrap;line-height:1.7;margin-bottom:1.25rem">${c.descripcion || ''}</p>
        ${c.material && logueado ? `<p style="color:#888;font-size:0.85rem;margin-bottom:0.5rem">📄 <strong style="color:#fff">Material:</strong> ${c.material}</p>` : ''}
        <div style="display:flex;flex-direction:column;gap:0.5rem;margin-top:1.25rem">
          ${verClaseBtn}
          ${descargaBtn}
          ${enlaceBtn}
        </div>
      `;
      modal.style.display = 'flex';
      modal.scrollTop = 0;
    }
  </script>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { db } from './js/firebase-config.js';
    import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    // Smart inicio link - redirect to panel if logged in
    onAuthStateChanged(auth, async (user) => {
      const inicioLinks = document.querySelectorAll('a[href="index.html"]');
      if (user) {
        try {
          const snap = await getDoc(doc(db, 'users', user.uid));
          if (snap.exists() && snap.data().estado === 'aprobado') {
            const panel = snap.data().rol === 'administrador' ? 'panel-admin.html' : 'panel-usuario.html';
            inicioLinks.forEach(a => { a.href = panel; a.textContent = 'Mi Panel'; });
            return;
          }
        } catch(e) {}
      }
    });
  </script>
</body>
</html>
