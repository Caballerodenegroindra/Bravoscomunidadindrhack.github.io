  <main>
    <div class="container section">
      <h1 class="section-title">Noticias y <span class="accent">Novedades</span></h1>
      <p class="section-subtitle">Enterate de las últimas clases, eventos y anuncios importantes de la academia.</p>

      <div id="noticias-grid" style="margin-top:2rem">

      </div>
    </div>
  </main>

    ACADEMIA INDRHACK — Formación en Informática, Ciberseguridad y Hacking Ético
  </footer>

  <script src="js/particles.js"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module">
    import { db } from './js/firebase-config.js';
    import { collection, getDocs, orderBy, query, where } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const grid = document.getElementById('noticias-grid');

    const CATEGORIAS = {
      clase: { label: 'Clase', color: '#00bfff' },
      evento: { label: 'Evento', color: '#ff6b35' },
      anuncio: { label: 'Anuncio', color: '#a855f7' },
      importante: { label: '⚠️ Importante', color: '#ff3b3b' },
    };

    try {
      const q = query(collection(db, 'noticias'), where('publicado', '==', true), orderBy('fecha', 'desc'));
      const snap = await getDocs(q);

      if (snap.empty) {
        grid.innerHTML = '<p class="section-subtitle">No hay noticias publicadas aún.</p>';
        return;
      }

      grid.innerHTML = snap.docs.map(d => {
        const n = d.data();
        const cat = CATEGORIAS[n.categoria] || { label: n.categoria, color: '#aaa' };
        const fecha = n.fecha?.toDate ? n.fecha.toDate().toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' }) : '—';
        return `
          <div class="card" style="margin-bottom:1.5rem">
            <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;flex-wrap:wrap">
              <span style="background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color};border-radius:20px;padding:2px 12px;font-size:0.78rem;font-weight:600">${cat.label}</span>
              <span style="color:#888;font-size:0.82rem">${fecha}</span>
            </div>
            <h3 style="margin:0 0 0.5rem">${n.titulo}</h3>
            <p class="section-subtitle" style="white-space:pre-wrap">${n.contenido}</p>
            ${n.enlace ? `<a href="${n.enlace}" target="_blank" class="btn btn--small btn--outline" style="margin-top:0.75rem">Ver más →</a>` : ''}
          </div>`;
      }).join('');
    } catch (err) {
      grid.innerHTML = '<p class="section-subtitle">Error al cargar noticias.</p>';
    }
  </script>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { db } from './js/firebase-config.js';
    import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    // Smart inicio link - redirect to panel if logged in
    onAuthStateChanged(auth, async (user) => {
      const inicioLinks = document.querySelectorAll('a[href="index.html"]');
      if (user) {
        try {
          const snap = await getDoc(doc(db, 'users', user.uid));
          if (snap.exists() && snap.data().estado === 'aprobado') {
            const panel = snap.data().rol === 'administrador' ? 'panel-admin.html' : 'panel-usuario.html';
            inicioLinks.forEach(a => { a.href = panel; a.textContent = 'Mi Panel'; });
            return;
          }
        } catch(e) {}
      }
    });
  </script>
