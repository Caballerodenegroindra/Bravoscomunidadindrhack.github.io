<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Academia Indrhack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <header class="navbar">
    <a href="index.html" class="navbar__brand">
      <span class="mark">⚘</span> ACADEMIA INDRHACK
    </a>
    <nav class="navbar__links">
      <a href="index.html">Inicio</a>
      <a href="cursos.html">Cursos</a>
      <a href="noticias.html">Noticias</a>
      <a href="redes.html">Redes</a>
      <a href="configuracion.html">Configuración</a>
      <div class="navbar__session" data-session-slot></div>
    </nav>
    <button class="navbar__toggle" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
  </header>

  <main>
    <div class="auth-shell">
      <div class="auth-card">
        <h1 class="auth-card__title">Iniciar sesión</h1>
        <p class="auth-card__subtitle">Accede con tu usuario y contraseña aprobados.</p>

        <form id="login-form" novalidate>
          <div class="field">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" required placeholder="usuario_indrhack" />
          </div>

          <div class="field">
            <label for="password">Contraseña</label>
            <div style="position:relative">
              <input type="password" id="password" name="password" required placeholder="••••••••" style="padding-right:2.5rem" />
              <button type="button" onclick="togglePwd('password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#888;cursor:pointer;font-size:1rem">👁</button>
            </div>
          </div>

          <button type="submit" class="btn btn--primary btn--block">Iniciar sesión</button>

          <div class="form-message" id="form-message"></div>
        </form>

        <p class="form-footer">
          ¿No tienes cuenta? <a href="registro.html">Regístrate</a>
        </p>
      </div>
    </div>
  </main>

  <footer class="footer">
    ACADEMIA INDRHACK — Formación en Informática, Ciberseguridad y Hacking Ético
  </footer>

  <script src="js/particles.js"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module">
    import { loginUser, ROLES } from './js/auth.js';

    const form = document.getElementById('login-form');
    const message = document.getElementById('form-message');

    function showMessage(text, type) {
      message.textContent = text;
      message.className = `form-message show form-message--${type}`;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.className = 'form-message';

      const username = form.username.value.trim();
      const password = form.password.value;

      if (!username || !password) {
        showMessage('Usuario y contraseña son obligatorios.', 'error');
        return;
      }

      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.disabled = true;

      try {
        const profile = await loginUser({ username, password });
        const destination = profile.rol === ROLES.ADMINISTRADOR ? 'panel-admin.html' : 'panel-usuario.html';
        window.location.href = destination;
      } catch (error) {
        showMessage(error.message || 'No se pudo iniciar sesión.', 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>

  <script>
  function togglePwd(id) {
    const input = document.getElementById(id);
    if (input) {
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  }
  </script>
</body>
</html>
