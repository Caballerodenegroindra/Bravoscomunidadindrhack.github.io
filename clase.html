  <style>
    /* ── BOTÓN FLOTANTE: preguntar en el chat del curso ── */
    .clase-chat-fab {
      position: fixed;
      left: 1rem;
      bottom: calc(var(--tabbar-h) + 1rem);
      z-index: 250;
      display: none;
      align-items: center;
      gap: 0.5rem;
      background: var(--color-accent-emphasis);
      color: #fff;
      border: 2px solid var(--gold);
      border-radius: 999px;
      padding: 0.65rem 1.1rem 0.65rem 0.85rem;
      font-size: 0.8rem;
      font-weight: 700;
      text-decoration: none;
      box-shadow: var(--shadow-lg);
      white-space: nowrap;
    }
    .clase-chat-fab.show { display: inline-flex; }
    .clase-chat-fab:hover { text-decoration: none; filter: brightness(1.12); }
    .clase-chat-fab svg { width: 18px; height: 18px; flex-shrink: 0; }
    @media (min-width: 641px) {
      .clase-chat-fab { bottom: 1.25rem; }
    }
    /* Deja lugar para no tapar el botón de ayuda en pantallas muy angostas */
    @media (max-width: 380px) {
      .clase-chat-fab span.fab-label { display: none; }
      .clase-chat-fab { padding: 0.65rem; }
    }

    /* ── HERO ── */
    .clase-hero {
      background: linear-gradient(135deg, #0d0d14 0%, #111 100%);
      border: 1px solid #0f1d38;
      border-radius: 16px;
      padding: 1.75rem;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .clase-hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--color-accent-emphasis), transparent);
    }

    /* ── BADGES ── */
    .nivel-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    .nivel-basico   { background: #c6a96522; color: #c6a965; border: 1px solid #c6a96544; }
    .nivel-intermedio { background: #c6a96522; color: #c6a965; border: 1px solid #c6a96544; }
    .nivel-avanzado { background: var(--color-accent-emphasis)22; color: var(--color-accent-emphasis); border: 1px solid var(--color-accent-emphasis)44; }
    .puntos-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: #c6a96515;
      border: 1px solid #c6a96540;
      color: #c6a965;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
      margin-left: 0.5rem;
    }

    /* ── CONTENT BLOCK ── */
    .content-block {
      background: #0c0c14;
      border: 1px solid #0a1428;
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      color: #c8c8d8;
      line-height: 1.85;
      font-size: 0.93rem;
    }
    .content-block .desc-titulo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: #fff;
      font-size: 1.02rem;
      margin: 1.1rem 0 0.5rem;
    }
    .content-block .desc-titulo:first-child { margin-top: 0; }
    .content-block .desc-num {
      background: var(--color-accent, #e0245e);
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
      width: 1.6rem;
      height: 1.6rem;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .content-block .desc-lista {
      margin: 0.4rem 0 0.9rem 1.2rem;
      padding: 0;
    }
    .content-block .desc-lista li { margin-bottom: 0.35rem; }
    .content-block .desc-parrafo { margin: 0 0 0.6rem; }
    .content-block strong { color: #fff; }
    .content-block pre {
      background: #05050a;
      border: 1px solid #1a1a2e;
      border-radius: 8px;
      padding: 0.85rem 1rem;
      overflow-x: auto;
      margin: 0.6rem 0 0.9rem;
    }
    .content-block pre code {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.82rem;
      color: #8ee08e;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }
    .section-header-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .section-header-icon--green { background: #3f8f5f14; border: 1px solid #3f8f5f30; }
    .section-header-icon--red   { background: var(--color-accent-emphasis)14; border: 1px solid var(--color-accent-emphasis)30; }
    .section-header h3 { margin: 0; font-size: 1rem; color: var(--text); }
    .section-header p  { margin: 0.15rem 0 0; font-size: 0.78rem; color: var(--text-muted); }

    /* ── TERMUX COMMANDS SECTION ── */
    .termux-section {
      background: #080c10;
      border: 1px solid #0f1d38;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .termux-section-top {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #0f1d38;
    }
    .termux-logo {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, #0d2b1a, #0f1d38);
      border: 1px solid #24365c;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .termux-title { margin: 0; font-size: 1rem; color: #3f8f5f; font-family: var(--font-body); font-weight: 700; letter-spacing: 0.05em; }
    .termux-subtitle { margin: 0.15rem 0 0; font-size: 0.78rem; color: #5c6c8c; }

    /* Command card */
    .cmd-card {
      background: #06100c;
      border: 1px solid #0d2218;
      border-radius: 12px;
      padding: 1rem 1rem 0.75rem;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s;
    }
    .cmd-card:last-child { margin-bottom: 0; }
    .cmd-card:hover { border-color: #24365c; }

    .cmd-label {
      font-size: 0.73rem;
      color: #5c6c8c;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }
    .cmd-description {
      font-size: 0.85rem;
      color: #9999aa;
      line-height: 1.55;
      margin-bottom: 0.6rem;
    }
    .cmd-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #030706;
      border: 1px solid #0a1428;
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      overflow: hidden;
    }
    .cmd-prompt {
      color: #3f8f5f;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      font-weight: 700;
      flex-shrink: 0;
      user-select: none;
    }
    .cmd-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.83rem;
      color: #d0f0d8;
      flex: 1;
      overflow-x: auto;
      white-space: nowrap;
      padding: 0.1rem 0;
    }
    .cmd-copy-btn {
      flex-shrink: 0;
      background: #0f1d38;
      border: 1px solid #24365c;
      border-radius: 6px;
      color: #3f8f5f;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.3rem 0.65rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-family: var(--font-body);
    }
    .cmd-copy-btn:hover { background: #0f1d38; border-color: #3f8f5f; }
    .cmd-copy-btn.copied { background: #3f8f5f22; border-color: #3f8f5f; color: #3f8f5f; }
    .cmd-copy-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* Tags inline de comando */
    .cmd-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.5rem;
    }
    .cmd-tag {
      font-size: 0.67rem;
      padding: 1px 7px;
      border-radius: 4px;
      background: #0a1428;
      color: #5c6c8c;
      border: 1px solid #0f1d38;
      font-weight: 500;
    }

    /* ── CUSTOM VIDEO PLAYER ── */
    .vp-wrap {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 1.25rem;
      border: 1px solid #0a1428;
      user-select: none;
    }
    .vp-wrap video { width: 100%; display: block; max-height: 75vw; object-fit: contain; }
    .vp-brightness { position: absolute; inset: 0; pointer-events: none; background: #000; opacity: 0; transition: opacity 0.1s; border-radius: 14px; }
    .vp-overlay { position: absolute; inset: 0; display: flex; align-items: stretch; }
    .vp-zone { flex: 1; }
    .vp-zone-center { flex: 1.2; display: flex; align-items: center; justify-content: center; }
    .vp-feedback { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%); background: rgba(0,0,0,0.75); color: #fff; font-size: 1rem; font-weight: 700; padding: 0.45rem 1rem; border-radius: 20px; pointer-events: none; opacity: 0; transition: opacity 0.25s; white-space: nowrap; z-index: 10; }
    .vp-feedback.show { opacity: 1; }
    .vp-controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.88)); padding: 1.5rem 0.75rem 0.65rem; display: flex; flex-direction: column; gap: 0.4rem; transition: opacity 0.3s; }
    .vp-controls.hidden { opacity: 0; pointer-events: none; }
    .vp-progress-wrap { position: relative; height: 4px; background: rgba(255,255,255,0.2); border-radius: 4px; cursor: pointer; }
    .vp-progress-fill { height: 100%; background: var(--color-accent-emphasis); border-radius: 4px; width: 0%; pointer-events: none; }
    .vp-progress-thumb { position: absolute; top: 50%; right: auto; width: 12px; height: 12px; background: #fff; border-radius: 50%; transform: translate(50%, -50%); left: 0%; pointer-events: none; }
    .vp-row { display: flex; align-items: center; gap: 0.5rem; }
    .vp-btn { background: none; border: none; color: #fff; font-size: 1.2rem; cursor: pointer; padding: 0.2rem 0.35rem; line-height: 1; }
    .vp-time { font-size: 0.72rem; color: rgba(255,255,255,0.8); font-family: monospace; margin-right: auto; }
    .vp-vol-icon { font-size: 1rem; }
    .vp-play-icon { font-size: 2.5rem; color: rgba(255,255,255,0.9); text-shadow: 0 0 20px rgba(0,0,0,0.8); pointer-events: none; opacity: 0; transition: opacity 0.2s; }
    .vp-play-icon.show { opacity: 1; }
    .vp-side-bar { position: absolute; right: 0.6rem; bottom: 3.5rem; width: 4px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; }
    .vp-side-fill { position: absolute; bottom: 0; left: 0; right: 0; background: #3f8f5f; transition: height 0.1s; }
    .vp-bright-bar { position: absolute; left: 0.6rem; bottom: 3.5rem; width: 4px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; }
    .vp-bright-fill { position: absolute; bottom: 0; left: 0; right: 0; background: #c6a965; transition: height 0.1s; }
    .video-wrap { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 14px; overflow: hidden; margin-bottom: 1.25rem; border: 1px solid #0a1428; }
    .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

    /* ── QUIZ ── */
    .quiz-section {
      background: #0a0a14;
      border: 1px solid #0f1d38;
      border-radius: 16px;
      padding: 1.75rem;
      margin-top: 1.5rem;
    }
    .quiz-section::before {
      /* accent line top */
    }
    .quiz-title { font-family: var(--font-body); font-size: 1.05rem; color: var(--color-accent-emphasis); margin: 0 0 0.35rem; }
    .quiz-subtitle { color: #777; font-size: 0.85rem; margin: 0 0 1.5rem; line-height: 1.6; }
    .pregunta-card { background: #0a1428; border: 1px solid #0f1d38; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .pregunta-card h4 { font-size: 0.92rem; color: #eee; margin: 0 0 0.85rem; line-height: 1.55; }
    .pregunta-card textarea { width: 100%; min-height: 90px; background: #080810; border: 1px solid #2a2a3e; border-radius: 8px; color: #ddd; font-size: 0.88rem; padding: 0.75rem; resize: vertical; font-family: inherit; box-sizing: border-box; transition: border-color 0.2s; }
    .pregunta-card textarea:focus { outline: none; border-color: var(--color-accent-emphasis); }
    .pregunta-num { display: inline-block; background: var(--color-accent-emphasis)18; color: var(--color-accent-emphasis); border: 1px solid var(--color-accent-emphasis)40; border-radius: 50%; width: 24px; height: 24px; line-height: 24px; text-align: center; font-size: 0.75rem; font-weight: 700; margin-right: 0.5rem; flex-shrink: 0; }
    .quiz-ya-enviado { background: #c6a9650e; border: 1px solid #c6a96530; border-radius: 12px; padding: 1.25rem; color: #c6a965; font-size: 0.9rem; display: flex; align-items: flex-start; gap: 0.75rem; }
    .quiz-aprobado { background: #3f8f5f0e; border: 1px solid #3f8f5f30; border-radius: 12px; padding: 1.25rem; color: #3f8f5f; }
    .quiz-rechazado { background: var(--color-accent-emphasis)0e; border: 1px solid var(--color-accent-emphasis)30; border-radius: 12px; padding: 1.25rem; color: var(--color-danger-fg); }

    /* ── MATERIAL BTN ── */
    .material-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #0a1428;
      border: 1px solid #0f1d38;
      border-radius: 10px;
      padding: 0.7rem 1.1rem;
      color: #aaa;
      text-decoration: none;
      font-size: 0.875rem;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      margin-bottom: 1rem;
    }
    .material-btn:hover { border-color: #c6a96555; color: #c6a965; background: #c6a96508; }

    /* ── PROGRESS STEPS ── */
    .progress-steps { display: flex; align-items: center; gap: 0; margin-bottom: 2rem; overflow-x: auto; padding-bottom: 0.25rem; }
    .step { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: #444; white-space: nowrap; }
    .step.active { color: var(--color-accent-emphasis); }
    .step.done { color: #3f8f5f; }
    .step-dot { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #222; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }
    .step.active .step-dot { border-color: var(--color-accent-emphasis); color: var(--color-accent-emphasis); }
    .step.done .step-dot { border-color: #3f8f5f; color: #3f8f5f; background: #3f8f5f14; }
    .step-line { width: 30px; height: 2px; background: #1a1a28; flex-shrink: 0; }
    .step.done + .step .step-line { background: #3f8f5f30; }

    /* ── DIVIDER ── */
    .section-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #0f1d38, transparent);
      margin: 1.5rem 0;
    }
  </style>
</head>

        <div class="step" id="step-resultado">
          <div class="step-dot">3</div> Resultado
        </div>
      </div>

      <div id="loading" style="color:#555;text-align:center;padding:3rem;font-size:0.9rem">Cargando clase…</div>
      <div id="clase-contenido" style="display:none"></div>
      <a href="#" id="clase-chat-fab" class="clase-chat-fab" aria-label="Preguntar sobre esta clase en el chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
        <span class="fab-label">Preguntar sobre esta clase</span>
      </a>
    </div>
  </main>

  <footer class="footer">ACADEMIA INDRHACK — Formación en Informática, Ciberseguridad y Hacking Ético</footer>

  <script src="js/particles.js"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/notif-widget.js"></script>
  <script type="module" src="js/back-confirm.js"></script>
  <script type="module">
    import { db, auth } from './js/firebase-config.js';
    import { doc, getDoc, setDoc, collection, query, where, getDocs, addDoc, Timestamp, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    const params   = new URLSearchParams(location.search);
    const cursoId  = params.get('id');
    const loading  = document.getElementById('loading');
    const contenidoEl = document.getElementById('clase-contenido');

    const nivelClass = { 'Básico': 'nivel-basico', 'Intermedio': 'nivel-intermedio', 'Avanzado': 'nivel-avanzado' };
    const puntosMap  = { 'Básico': 100, 'Intermedio': 200, 'Avanzado': 400 };

    if (!cursoId) {
      loading.innerHTML = '<p style="color:var(--color-danger-fg)">No se especificó ninguna clase. <a href="cursos.html" style="color:#c6a965">Volver</a></p>';
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        loading.innerHTML = '<div style="text-align:center;padding:2rem"><p style="color:var(--color-danger-fg);margin-bottom:1rem">⚠️ Debes iniciar sesión para ver esta clase.</p><a href="login.html" class="btn btn--primary">Iniciar sesión</a></div>';
        return;
      }
      try {
        const userSnap = await getDoc(doc(db, 'users', user.uid));
        const userData = userSnap.data();
        if (!userSnap.exists() || userData.estado !== 'aprobado') {
          loading.innerHTML = '<p style="color:var(--color-danger-fg);text-align:center">⚠️ Tu cuenta aún no está aprobada. Contacta al administrador.</p>';
          return;
        }
        if (!cursoId) return;
        const cursoSnap = await getDoc(doc(db, 'courses', cursoId));
        if (!cursoSnap.exists()) {
          loading.innerHTML = '<p style="color:var(--color-danger-fg)">Clase no encontrada.</p>';
          return;
        }
        const curso = { id: cursoSnap.id, ...cursoSnap.data() };
        const quizSnap = await getDocs(query(
          collection(db, 'quiz_submissions'),
          where('cursoId', '==', cursoId),
          where('uid', '==', user.uid)
        ));
        const submission = quizSnap.empty ? null : { id: quizSnap.docs[0].id, ...quizSnap.docs[0].data() };
        renderClase(curso, userData, user.uid, submission);

        // Guardamos qué clase vio por última vez para que "Mi panel"
        // pueda ofrecerle "Continuar donde te quedaste" directo a esta clase.
        setDoc(doc(db, 'users', user.uid), {
          ultimaClase: {
            id: curso.id,
            titulo: curso.titulo || 'Clase',
            categoria: curso.categoria || '',
            completada: !!(submission && submission.estado === 'aprobado'),
            fecha: serverTimestamp(),
          },
        }, { merge: true }).catch(() => { /* no bloqueamos la vista de la clase si esto falla */ });
      } catch(e) {
        loading.innerHTML = '<p style="color:var(--color-danger-fg)">Error al cargar: ' + e.message + '</p>';
      }
    });

    function escapeHtml(str) {
      if (!str) return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function extractYouTubeId(url) {
      if (!url) return null;
      const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    /* ─── RENDER TERMUX COMMANDS ─── */
    function renderTermuxSection(comandos) {
      // comandos: array of { etiqueta, descripcion, comando, tags[] }
      // If none from Firestore, show nothing (admin hasn't added any)
      if (!comandos || comandos.length === 0) return '';

      const cardsHTML = comandos.map((c, i) => `
        <div class="cmd-card">
          ${c.etiqueta ? `<div class="cmd-label">${c.etiqueta}</div>` : ''}
          ${c.descripcion ? `<div class="cmd-description">${c.descripcion}</div>` : ''}
          <div class="cmd-row">
            <span class="cmd-prompt">$</span>
            <span class="cmd-text" id="cmd-text-${i}">${escapeHtml(c.comando)}</span>
            <button class="cmd-copy-btn" onclick="copiarComando(this, 'cmd-text-${i}')">
              <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
              Copiar
            </button>
          </div>
          ${c.tags && c.tags.length ? `<div class="cmd-tags">${c.tags.map(t => `<span class="cmd-tag">${t}</span>`).join('')}</div>` : ''}
        </div>
      `).join('');

      return `
        <div class="termux-section">
          <div class="termux-section-top">
            <div class="termux-logo">💻</div>
            <div>
              <p class="termux-title">Comandos Termux</p>
              <p class="termux-subtitle">${comandos.length} comando${comandos.length !== 1 ? 's' : ''} — toca Copiar para usar en Termux</p>
            </div>
          </div>
          ${cardsHTML}
        </div>
      `;
    }

    /* ─── MINI-MARKDOWN SEGURO ───
       Escapa TODO el HTML primero (así no se puede inyectar <script>),
       y recién después interpreta un formato simple tipo Markdown. */
    function renderDescripcion(str) {
      if (!str) return '';
      const safe = escapeHtml(str);
      const lineas = safe.split('\n');
      let html = '';
      let enLista = false;
      let enCodigo = false;

      const cerrarLista = () => { if (enLista) { html += '</ul>'; enLista = false; } };

      for (let linea of lineas) {
        // Bloques de código ```
        if (/^```/.test(linea.trim())) {
          cerrarLista();
          if (!enCodigo) { html += '<pre><code>'; enCodigo = true; }
          else { html += '</code></pre>'; enCodigo = false; }
          continue;
        }
        if (enCodigo) { html += linea + '\n'; continue; }

        // Negrita inline **texto**
        const conNegrita = linea.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

        // Títulos numerados: "1. Algo" o "1) Algo"
        const matchTitulo = conNegrita.match(/^\s*(\d+)[\.\)]\s+(.*)$/);
        // Listas con guion o asterisco: "- item" o "* item"
        const matchItem = conNegrita.match(/^\s*[-*]\s+(.*)$/);

        if (matchTitulo) {
          cerrarLista();
          html += `<h4 class="desc-titulo"><span class="desc-num">${matchTitulo[1]}</span>${matchTitulo[2]}</h4>`;
        } else if (matchItem) {
          if (!enLista) { html += '<ul class="desc-lista">'; enLista = true; }
          html += `<li>${matchItem[1]}</li>`;
        } else if (linea.trim() === '') {
          cerrarLista();
          html += '<br>';
        } else {
          cerrarLista();
          html += `<p class="desc-parrafo">${conNegrita}</p>`;
        }
      }
      cerrarLista();
      if (enCodigo) html += '</code></pre>';
      return html;
    }

    /* ─── RENDER CLASE ─── */
    function renderClase(curso, userData, uid, submission) {
      loading.style.display = 'none';
      contenidoEl.style.display = 'block';

      // Botón flotante: abre (o crea) la sala de chat de este curso específico
      const chatFab = document.getElementById('clase-chat-fab');
      if (chatFab) {
        const params = new URLSearchParams({
          curso: curso.id,
          titulo: curso.titulo || 'Clase',
          cat: curso.categoria || ''
        });
        chatFab.href = `chat.html?${params.toString()}`;
        chatFab.classList.add('show');
      }

      const puntos = puntosMap[curso.nivel] || 100;
      const ytId   = extractYouTubeId(curso.enlace || '');

      // Actualizar pasos
      if (submission) {
        document.getElementById('step-quiz').classList.add('done');
        document.getElementById('step-resultado').classList.add(
          submission.estado === 'aprobado' ? 'done' : 'active'
        );
      } else {
        document.getElementById('step-quiz').classList.add('active');
      }

      const preguntas = curso.quiz_preguntas || [
        '¿Cuál es el concepto principal de esta clase?',
        '¿Qué pasos seguirías para aplicar lo aprendido?',
        '¿Qué riesgos o precauciones debes tener en cuenta?',
        '¿Cómo explicarías este tema a alguien que no lo conoce?'
      ];

      let quizHTML = '';
      if (submission) {
        if (submission.estado === 'aprobado') {
          quizHTML = `
            <div class="quiz-aprobado">
              <div style="font-size:1.5rem;margin-bottom:0.5rem">🎉</div>
              <strong>¡Felicidades! Quiz aprobado</strong>
              <p style="margin:0.5rem 0 0;font-size:0.875rem;opacity:0.85">
                Ganaste <strong>${puntos} puntos</strong> y desbloqueaste tu certificado y badge de esta clase.
              </p>
            </div>`;
        } else if (submission.estado === 'rechazado') {
          quizHTML = `
            <div class="quiz-rechazado">
              <div style="font-size:1.5rem;margin-bottom:0.5rem">❌</div>
              <strong>Quiz no aprobado</strong>
              <p style="margin:0.5rem 0 0;font-size:0.875rem;opacity:0.85">
                ${submission.feedback || 'El administrador revisó tus respuestas y no aprobó el quiz. Repasa el contenido e intenta nuevamente.'}
              </p>
              <button class="btn btn--outline btn--small" style="margin-top:1rem" onclick="location.reload()">🔄 Reintentar</button>
            </div>`;
        } else {
          quizHTML = `
            <div class="quiz-ya-enviado">
              <div style="font-size:1.5rem">⏳</div>
              <div>
                <strong>Quiz enviado — Pendiente de revisión</strong>
                <p style="margin:0.35rem 0 0;font-size:0.85rem;opacity:0.8">
                  El administrador revisará tus respuestas y te notificará el resultado. Revisá tu perfil para ver si ya aprobaste.
                </p>
              </div>
            </div>`;
        }
      } else {
        quizHTML = `
          <p class="quiz-subtitle">Respondé las ${preguntas.length} preguntas. El admin revisará tus respuestas y, si aprobás, te asignará los puntos automáticamente.</p>
          <form id="quiz-form">
            ${preguntas.map((p, i) => `
              <div class="pregunta-card">
                <h4><span class="pregunta-num">${i + 1}</span>${p}</h4>
                <textarea name="r${i}" placeholder="Tu respuesta…" required></textarea>
              </div>
            `).join('')}
            <button type="submit" class="btn btn--primary" style="width:100%;margin-top:0.5rem;justify-content:center">
              📤 Enviar respuestas
            </button>
          </form>`;
      }

      // Termux commands
      const termuxHTML = renderTermuxSection(curso.termux_comandos || []);

      contenidoEl.innerHTML = `
        <!-- HERO -->
        <div class="clase-hero">
          <div style="margin-bottom:0.6rem">
            <span class="nivel-badge ${nivelClass[curso.nivel] || 'nivel-basico'}">${curso.nivel || 'Básico'}</span>
            <span class="puntos-badge">⭐ ${puntos} pts</span>
          </div>
          <h1 style="margin:0 0 0.65rem;font-size:clamp(1.1rem,4vw,1.55rem);line-height:1.3">${curso.titulo}</h1>
          <p style="color:#666;font-size:0.85rem;margin:0;display:flex;align-items:center;gap:0.4rem">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
            ${curso.categoria || 'General'}
          </p>
        </div>

        <!-- VIDEO -->
        ${ytId ? `<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1&playsinline=1&fs=1" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe></div>` : ''}

        <!-- DESCRIPCIÓN -->
        ${curso.descripcion ? `
        <div>
          <div class="section-header" style="margin-bottom:0.75rem">
            <div class="section-header-icon section-header-icon--red">📋</div>
            <div>
              <h3>Contenido de la clase</h3>
            </div>
          </div>
          <div class="content-block">${renderDescripcion(curso.descripcion)}</div>
        </div>` : ''}

        <!-- TERMUX COMMANDS -->
        ${termuxHTML}

        <!-- MATERIAL -->
        ${curso.descarga || (curso.enlace && !ytId) ? `<div class="section-divider"></div>` : ''}
        ${curso.descarga ? `<a href="${curso.descarga}" target="_blank" class="material-btn">⬇ Descargar video de la clase</a>` : ''}
        ${curso.enlace && !ytId ? `<a href="${curso.enlace}" target="_blank" class="material-btn">🔗 Acceder al recurso externo</a>` : ''}

        <!-- QUIZ -->
        <div class="section-divider"></div>
        <div class="quiz-section">
          <h2 class="quiz-title">🧠 Quiz de evaluación</h2>
          ${quizHTML}
        </div>
      `;

      // Bind quiz form
      const form = document.getElementById('quiz-form');
      if (form) {
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const btn = form.querySelector('button[type=submit]');
          btn.disabled = true;
          btn.textContent = 'Enviando…';
          try {
            const respuestas = preguntas.map((p, i) => ({
              pregunta: p,
              respuesta: (form.elements['r' + i]?.value || '').trim()
            }));
            await addDoc(collection(db, 'quiz_submissions'), {
              uid,
              username: userData.username || '',
              displayName: userData.displayName || '',
              cursoId: curso.id,
              cursoTitulo: curso.titulo,
              nivel: curso.nivel || 'Básico',
              puntos,
              respuestas,
              estado: 'pendiente',
              fechaEnvio: Timestamp.now(),
            });
            location.reload();
          } catch(err) {
            btn.disabled = false;
            btn.textContent = '📤 Enviar respuestas';
            alert('Error al enviar: ' + err.message);
          }
        });
      }
    }

    // ── CUSTOM VIDEO PLAYER LOGIC ──
    (function() {
      const video = document.getElementById('vp-video');
      if (!video) return;
      const wrap       = document.getElementById('vp-wrap');
      const brightness = document.getElementById('vp-brightness');
      const feedback   = document.getElementById('vp-feedback');
      const controls   = document.getElementById('vp-controls');
      const playBtn    = document.getElementById('vp-playbtn');
      const muteBtn    = document.getElementById('vp-mutebtn');
      const fullBtn    = document.getElementById('vp-fullbtn');
      const timeEl     = document.getElementById('vp-time');
      const progWrap   = document.getElementById('vp-progress-wrap');
      const progFill   = document.getElementById('vp-progress-fill');
      const progThumb  = document.getElementById('vp-progress-thumb');
      const playIcon   = document.getElementById('vp-play-icon');
      const volFill    = document.getElementById('vp-vol-fill');
      const brightFill = document.getElementById('vp-bright-fill');
      let brightLevel  = 0.5;
      let hideTimer    = null;
      let fbTimer      = null;
      function fmt(s) { s = Math.floor(s); const m = Math.floor(s / 60), ss = s % 60; return m + ':' + String(ss).padStart(2,'0'); }
      function showFeedback(txt) { feedback.textContent = txt; feedback.classList.add('show'); clearTimeout(fbTimer); fbTimer = setTimeout(() => feedback.classList.remove('show'), 900); }
      function flashIcon(icon) { playIcon.textContent = icon; playIcon.classList.add('show'); setTimeout(() => playIcon.classList.remove('show'), 500); }
      function showControls() { controls.classList.remove('hidden'); clearTimeout(hideTimer); hideTimer = setTimeout(() => { if (!video.paused) controls.classList.add('hidden'); }, 3000); }
      function togglePlay() { if (video.paused) { video.play(); flashIcon('▶'); } else { video.pause(); flashIcon('⏸'); } showControls(); }
      playBtn.onclick = togglePlay;
      video.addEventListener('play',  () => { playBtn.textContent = '⏸'; showControls(); });
      video.addEventListener('pause', () => { playBtn.textContent = '▶'; controls.classList.remove('hidden'); });
      video.addEventListener('timeupdate', () => { if (!video.duration) return; const pct = (video.currentTime / video.duration) * 100; progFill.style.width = pct + '%'; progThumb.style.left = pct + '%'; timeEl.textContent = fmt(video.currentTime) + ' / ' + fmt(video.duration); });
      progWrap.addEventListener('click', e => { const r = progWrap.getBoundingClientRect(); video.currentTime = ((e.clientX - r.left) / r.width) * video.duration; showControls(); });
      muteBtn.onclick = () => { video.muted = !video.muted; muteBtn.textContent = video.muted ? '🔇' : '🔊'; showControls(); };
      fullBtn.onclick = () => { if (document.fullscreenElement) document.exitFullscreen(); else wrap.requestFullscreen && wrap.requestFullscreen(); showControls(); };
      let touchStartX = 0, touchStartY = 0, touchStartVol = 1, touchStartBright = 0.5, lastTapTime = 0, lastTapZone = '', gestureMode = null;
      wrap.addEventListener('touchstart', e => { const t = e.touches[0]; touchStartX = t.clientX; touchStartY = t.clientY; touchStartVol = video.volume; touchStartBright = brightLevel; gestureMode = null; showControls(); }, { passive: true });
      wrap.addEventListener('touchmove', e => { const t = e.touches[0]; const dx = t.clientX - touchStartX; const dy = t.clientY - touchStartY; const wRect = wrap.getBoundingClientRect(); const isRight = touchStartX > wRect.width / 2; if (!gestureMode && Math.abs(dy) > 12 && Math.abs(dy) > Math.abs(dx)) { gestureMode = isRight ? 'vol' : 'bright'; } if (gestureMode === 'vol') { const delta = -(dy / 150); video.volume = Math.max(0, Math.min(1, touchStartVol + delta)); volFill.style.height = (video.volume * 100) + '%'; showFeedback('🔊 ' + Math.round(video.volume * 100) + '%'); } else if (gestureMode === 'bright') { brightLevel = Math.max(0, Math.min(0.85, touchStartBright - dy / 200)); brightness.style.opacity = brightLevel; brightFill.style.height = ((1 - brightLevel) * 100) + '%'; showFeedback('☀️ ' + Math.round((1 - brightLevel) * 100) + '%'); } }, { passive: true });
      wrap.addEventListener('touchend', e => { if (gestureMode) { gestureMode = null; return; } const t = e.changedTouches[0]; const wRect = wrap.getBoundingClientRect(); const zone = t.clientX < wRect.left + wRect.width * 0.35 ? 'left' : t.clientX > wRect.left + wRect.width * 0.65 ? 'right' : 'center'; const now = Date.now(); const isDouble = (now - lastTapTime < 280) && (lastTapZone === zone); lastTapTime = now; lastTapZone = zone; if (isDouble) { if (zone === 'right') { video.currentTime = Math.min(video.duration, video.currentTime + 5); showFeedback('⏩ +5s'); } else if (zone === 'left') { video.currentTime = Math.max(0, video.currentTime - 5); showFeedback('⏪ -5s'); } } else if (zone === 'center') { togglePlay(); } }, { passive: true });
      volFill.style.height = '100%';
    })();
  </script>

  <script>
    // ── COPY COMMAND (global, outside module) ──
    function copiarComando(btn, textId) {
      const el  = document.getElementById(textId);
      const txt = el ? el.textContent : '';
      if (!txt) return;
      navigator.clipboard.writeText(txt).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5"><polyline points="20 6 9 17 4 12"/></svg> ¡Copiado!`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copiar`;
        }, 2000);
      }).catch(() => {
        // Fallback para navegadores sin clipboard API
        const range = document.createRange();
        range.selectNode(el);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        window.getSelection().removeAllRanges();
        btn.classList.add('copied');
        btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5"><polyline points="20 6 9 17 4 12"/></svg> ¡Copiado!`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copiar`;
        }, 2000);
      });
    }
  </script>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { db } from './js/firebase-config.js';
    import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    onAuthStateChanged(auth, async (user) => {
      const inicioLinks = document.querySelectorAll('a[href="index.html"]');
      if (user) {
        try {
          const snap = await getDoc(doc(db, 'users', user.uid));
          if (snap.exists() && snap.data().estado === 'aprobado') {
            const panel = snap.data().rol === 'administrador' ? 'panel-admin.html' : 'panel-usuario.html';
            inicioLinks.forEach(a => { a.href = panel; a.textContent = 'Mi Panel'; });
          }
        } catch(e) {}
      }
    });
  </script>
