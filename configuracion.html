<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configuración — Academia Indrhack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <header class="navbar">
    <a href="index.html" class="navbar__brand">
      <span class="mark">⚘</span> ACADEMIA INDRHACK
    </a>
    <nav class="navbar__links">
      <a href="index.html">Inicio</a>
      <a href="cursos.html">Cursos</a>
      <a href="redes.html">Redes</a>
      <a href="configuracion.html" class="active">Configuración</a>
      <div class="navbar__session" data-session-slot></div>
    </nav>
    <button class="navbar__toggle" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
  </header>

  <main>
    <div class="container section">
      <h1 class="section-title">Configuración</h1>

      <!-- Cuenta (visible para cualquier miembro aprobado) -->
      <div class="card" style="max-width:560px; margin-bottom:var(--gap-lg)">
        <h3>Mi cuenta</h3>
        <p class="section-subtitle">
          Usuario: <strong data-account-username>—</strong><br />
          Rol: <strong data-account-rol>—</strong><br />
          Estado: <strong data-account-estado>—</strong>
        </p>
        <button class="btn btn--outline btn--small" data-logout>Cerrar sesión</button>
      </div>

      <!-- Configuración del sitio (solo administrador) -->
      <div class="card hidden" id="site-config" style="max-width:560px">
        <h3>Configuración del sitio</h3>
        <p class="section-subtitle">Estos valores se guardan en Firestore (config/site) para usarse en el resto del sitio.</p>

        <form id="site-config-form">
          <div class="field">
            <label for="subtitulo">Subtítulo de inicio</label>
            <input type="text" id="subtitulo" name="subtitulo" />
          </div>

          <div class="field">
            <label for="lema">Lema</label>
            <input type="text" id="lema" name="lema" />
          </div>

          <div class="field">
            <label for="link-facebook">Enlace de Facebook</label>
            <input type="url" id="link-facebook" name="facebook" />
          </div>

          <div class="field">
            <label for="link-youtube">Enlace de YouTube</label>
            <input type="url" id="link-youtube" name="youtube" />
          </div>

          <div class="field">
            <label for="link-whatsapp-canal">Canal de WhatsApp</label>
            <input type="url" id="link-whatsapp-canal" name="whatsappCanal" />
          </div>

          <div class="field">
            <label for="link-whatsapp-grupo">Grupo de WhatsApp</label>
            <input type="url" id="link-whatsapp-grupo" name="whatsappGrupo" />
          </div>

          <button type="submit" class="btn btn--primary">Guardar configuración</button>
          <div class="form-message" id="form-message"></div>
        </form>
      </div>
    </div>
  </main>

  <footer class="footer">
    ACADEMIA INDRHACK — Formación en Informática, Ciberseguridad y Hacking Ético
  </footer>

  <script src="js/particles.js"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module">
    import { db } from './js/firebase-config.js';
    import { doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { requireApprovedUser, logoutUser, ROLES } from './js/auth.js';

    requireApprovedUser('login.html').then(async (profile) => {
      if (!profile) return;

      document.querySelector('[data-account-username]').textContent = profile.username;
      document.querySelector('[data-account-rol]').textContent = profile.rol;
      document.querySelector('[data-account-estado]').textContent = profile.estado;

      document.querySelector('[data-logout]').addEventListener('click', async () => {
        await logoutUser();
        window.location.href = 'index.html';
      });

      if (profile.rol !== ROLES.ADMINISTRADOR) return;

      const siteConfigEl = document.getElementById('site-config');
      siteConfigEl.classList.remove('hidden');

      const form = document.getElementById('site-config-form');
      const message = document.getElementById('form-message');

      const snap = await getDoc(doc(db, 'config', 'site'));
      if (snap.exists()) {
        const data = snap.data();
        form.subtitulo.value = data.subtitulo || '';
        form.lema.value = data.lema || '';
        form.facebook.value = data.facebook || '';
        form.youtube.value = data.youtube || '';
        form.whatsappCanal.value = data.whatsappCanal || '';
        form.whatsappGrupo.value = data.whatsappGrupo || '';
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          await setDoc(doc(db, 'config', 'site'), {
            subtitulo: form.subtitulo.value.trim(),
            lema: form.lema.value.trim(),
            facebook: form.facebook.value.trim(),
            youtube: form.youtube.value.trim(),
            whatsappCanal: form.whatsappCanal.value.trim(),
            whatsappGrupo: form.whatsappGrupo.value.trim(),
          }, { merge: true });

          message.textContent = 'Configuración guardada.';
          message.className = 'form-message show form-message--success';
        } catch (error) {
          message.textContent = error.message || 'No se pudo guardar la configuración.';
          message.className = 'form-message show form-message--error';
        }
      });
    });
  </script>
</body>
</html>
