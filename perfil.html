<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi perfil — Academia Indrhack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .profile-photo {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border-strong);
      box-shadow: var(--shadow-glow);
    }
    .profile-header {
      display: flex;
      align-items: center;
      gap: var(--gap-lg);
      flex-wrap: wrap;
      margin-bottom: var(--gap-lg);
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <header class="navbar">
    <a href="index.html" class="navbar__brand">
      <span class="mark">⚘</span> ACADEMIA INDRHACK
    </a>
    <nav class="navbar__links">
      <a href="index.html">Inicio</a>
      <a href="cursos.html">Cursos</a>
      <a href="redes.html">Redes</a>
      <a href="configuracion.html">Configuración</a>
      <div class="navbar__session" data-session-slot></div>
    </nav>
    <button class="navbar__toggle" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
  </header>

  <main>
    <div class="container section">
      <h1 class="section-title">Mi <span class="accent">perfil</span></h1>

      <div class="profile-header">
        <img class="profile-photo" src="assets/img/avatar-placeholder.svg" alt="Foto de perfil" data-photo-preview />
        <div>
          <label class="btn btn--outline btn--small" style="cursor:pointer">
            Subir foto
            <input type="file" accept="image/*" data-photo-input style="display:none" />
          </label>
          <p class="section-subtitle" style="margin-top:0.5rem">
            Rango: <strong data-profile-rango>—</strong> · Miembro desde <strong data-profile-fecha>—</strong>
          </p>
        </div>
      </div>

      <form id="profile-form" class="card" style="max-width:560px">
        <div class="field">
          <label for="display-name">Nombre visible</label>
          <input type="text" id="display-name" name="displayName" />
        </div>

        <div class="field">
          <label for="motivaciones">Motivaciones</label>
          <textarea id="motivaciones" name="motivaciones" rows="3" placeholder="¿Qué te motiva a aprender ciberseguridad?"></textarea>
        </div>

        <div class="field">
          <label for="gustos">Gustos</label>
          <textarea id="gustos" name="gustos" rows="3" placeholder="Temas, herramientas o áreas que más te interesan"></textarea>
        </div>

        <button type="submit" class="btn btn--primary">Guardar cambios</button>
        <div class="form-message" id="form-message"></div>
      </form>
    </div>
  </main>

  <footer class="footer">
    ACADEMIA INDRHACK — Formación en Informática, Ciberseguridad y Hacking Ético
  </footer>

  <script src="js/particles.js"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module">
    import { db, storage } from './js/firebase-config.js';
    import { doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';
    import { requireApprovedUser, getUserProfile } from './js/auth.js';

    const form = document.getElementById('profile-form');
    const message = document.getElementById('form-message');
    const photoPreview = document.querySelector('[data-photo-preview]');
    const photoInput = document.querySelector('[data-photo-input]');

    const params = new URLSearchParams(window.location.search);
    const viewingUid = params.get('uid');

    requireApprovedUser('login.html').then(async (profile) => {
      if (!profile) return;

      // Un administrador puede abrir el perfil de otro usuario en modo lectura.
      const target = viewingUid && viewingUid !== profile.uid
        ? await getUserProfile(viewingUid)
        : profile;

      const readOnly = !!(viewingUid && viewingUid !== profile.uid);

      paint(target);

      if (readOnly) {
        form.querySelectorAll('input, textarea, button[type="submit"]').forEach((el) => el.disabled = true);
        document.querySelector('[data-photo-input]').closest('label').classList.add('hidden');
        return;
      }

      photoInput.addEventListener('change', async () => {
        const file = photoInput.files[0];
        if (!file) return;

        const storageRef = ref(storage, `avatars/${profile.uid}`);
        await uploadBytes(storageRef, file);
        const url = await getDownloadURL(storageRef);
        await updateDoc(doc(db, 'users', profile.uid), { photoURL: url });
        photoPreview.src = url;
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        message.className = 'form-message';

        try {
          await updateDoc(doc(db, 'users', profile.uid), {
            displayName: form.displayName.value.trim(),
            motivaciones: form.motivaciones.value.trim(),
            gustos: form.gustos.value.trim(),
          });
          message.textContent = 'Cambios guardados.';
          message.className = 'form-message show form-message--success';
        } catch (error) {
          message.textContent = error.message || 'No se pudieron guardar los cambios.';
          message.className = 'form-message show form-message--error';
        }
      });
    });

    function paint(profile) {
      if (!profile) return;

      if (profile.photoURL) photoPreview.src = profile.photoURL;
      form.displayName.value = profile.displayName || '';
      form.motivaciones.value = profile.motivaciones || '';
      form.gustos.value = profile.gustos || '';

      document.querySelector('[data-profile-rango]').textContent = profile.rango || 'Iniciado';

      const fecha = profile.fechaIngreso?.toDate ? profile.fechaIngreso.toDate() : null;
      document.querySelector('[data-profile-fecha]').textContent = fecha
        ? fecha.toLocaleDateString('es-MX', { year: 'numeric', month: 'short', day: 'numeric' })
        : '—';
    }
  </script>
</body>
</html>
